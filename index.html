*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 0; }
html { font-size: 18px; }
body {
  min-height: 100vh; font-family: 'Cormorant Garamond', serif; color: #d0c8b0;
  max-width: 430px; margin: 0 auto;
  background: linear-gradient(180deg, #08081a 0%, #0d1025 40%, #121430 100%);
}
.sans { font-family: 'Fira Sans', sans-serif; }
.content { padding: 16px 16px 120px; }

/* Header */
header { text-align: center; margin-bottom: 8px; padding-top: 12px; }
header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 6px; color: #e8dfc4; text-transform: uppercase; }
.loc { font-size: 0.72rem; color: #6a6a8a; margin-top: 4px; font-family:'Fira Sans',sans-serif; }
.date-indicator {
  background: rgba(200,180,120,0.1); border: 1px solid rgba(200,180,120,0.2);
  padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; margin-top: 8px;
  display: inline-block; cursor: pointer; font-family:'Fira Sans',sans-serif;
}

/* Cards */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.stat-card {
  background: rgba(255,255,255,0.03); border-radius: 14px; padding: 14px;
  text-align: center; border: 1px solid rgba(255,255,255,0.06);
}
.stat-card .lbl { font-size: 0.65rem; color: #7a7a9a; letter-spacing: 1px; margin-bottom: 6px; font-family:'Fira Sans',sans-serif; text-transform:uppercase; }
.stat-card .val { font-size: 1.3rem; }
.stat-card .sub { font-size: 0.67rem; color: #5a5a7a; margin-top: 4px; font-family:'Fira Sans',sans-serif; }

/* Sections */
.section {
  background: rgba(255,255,255,0.03); border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06); margin-top: 12px; overflow: hidden;
}
.section-title {
  font-size: 0.67rem; color: #7a7a9a; letter-spacing: 1.5px; text-transform: uppercase;
  font-family: 'Fira Sans', sans-serif; padding: 10px 14px 4px;
}
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.row:last-child { border-bottom: none; }
.row-label { font-size: 0.8rem; color: #9a9aaa; font-family:'Fira Sans',sans-serif; }

/* Planètes */
.planet-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.planet-row:last-child { border-bottom:none; }
.planet-icon { font-size:1.3rem; width:32px; text-align:center; }
.planet-info { flex:1; }
.planet-name { font-size:1rem; }
.planet-detail { font-size:0.72rem; color:#7a7a9a; font-family:'Fira Sans',sans-serif; margin-top:3px; line-height:1.4; }
.planet-badge { font-size:0.67rem; font-family:'Fira Sans',sans-serif; padding:3px 8px; border-radius:10px; font-weight:500; white-space:nowrap; }
.badge-soir  { background:rgba(255,180,50,0.15);  color:#ffb432; border:1px solid rgba(255,180,50,0.3); }
.badge-matin { background:rgba(100,180,255,0.15); color:#64b4ff; border:1px solid rgba(100,180,255,0.3); }
.badge-non   { background:rgba(100,100,120,0.15); color:#6a6a8a; border:1px solid rgba(100,100,120,0.2); }

/* Ce soir */
.tonight-hero {
  background: radial-gradient(ellipse at 30% 30%, rgba(100,120,200,0.15), transparent 70%);
  border-radius:16px; padding:18px 16px; text-align:center; margin-bottom:14px;
  border:1px solid rgba(100,120,200,0.15);
}
.tonight-score-big { font-size:2rem; font-weight:300; line-height:1; letter-spacing:6px; }
.best-window { background:rgba(100,200,120,0.08); border:1px solid rgba(100,200,120,0.2); border-radius:10px; padding:10px 14px; margin-top:10px; }
.weather-bar { display:flex; gap:3px; margin:4px 0; }
.weather-slot { flex:1; border-radius:5px; overflow:hidden; }
.weather-slot-inner { height:40px; position:relative; }
.weather-time { font-size:0.58rem; color:#6a6a8a; text-align:center; font-family:'Fira Sans',sans-serif; margin-top:3px; }

/* Marées */
.coeff-bar-bg { background:rgba(255,255,255,0.05); border-radius:8px; height:8px; margin:8px 0 3px; overflow:hidden; }
.coeff-bar-fill { height:100%; border-radius:8px; transition:width 0.6s ease; }

/* Calendrier */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
.cal-cell { padding:7px 1px; border-radius:7px; cursor:pointer; }
.cal-cell.selected { border:1px solid #c8b878; background:rgba(200,180,120,0.12); }
.cal-cell.today .cal-day { font-weight:bold; color:#fff; text-decoration:underline; }
.event-dot { width:4px; height:4px; border-radius:50%; margin:2px auto 0; }

.filter-bar { display:flex; gap:6px; flex-wrap:wrap; padding:10px 14px 6px; }
.filter-btn {
  font-size:0.67rem; font-family:'Fira Sans',sans-serif; padding:5px 11px;
  border-radius:14px; border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04); color:#9a9aaa; cursor:pointer;
}
.filter-btn.active { background:rgba(200,184,120,0.2); border-color:#c8b878; color:#e8dfc4; }
.event-item { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.event-item:last-child { border-bottom:none; }
.event-title { font-size:0.92rem; line-height:1.3; }
.event-detail { font-size:0.72rem; color:#7a7a9a; font-family:'Fira Sans',sans-serif; margin-top:3px; }
.event-date { font-size:0.72rem; font-family:'Fira Sans',sans-serif; color:#c8b878; }
.event-when { font-size:0.65rem; color:#6a6a8a; font-family:'Fira Sans',sans-serif; }

.mission-card { padding:13px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.mission-card:last-child { border-bottom:none; }
.mission-name { font-size:0.95rem; line-height:1.3; }
.mission-agency { font-size:0.72rem; color:#c8b878; font-family:'Fira Sans',sans-serif; margin-top:3px; }
.mission-desc { font-size:0.75rem; color:#8a8aaa; font-family:'Fira Sans',sans-serif; margin-top:4px; line-height:1.5; }
.mission-badge { display:inline-block; font-size:0.62rem; font-family:'Fira Sans',sans-serif; padding:3px 8px; border-radius:8px; margin-top:6px; font-weight:500; }

.badge-upcoming { background:rgba(200,184,120,0.15); color:#c8b878; border:1px solid rgba(200,184,120,0.3); }
.badge-planned  { background:rgba(100,150,255,0.15); color:#6496ff; border:1px solid rgba(100,150,255,0.3); }
.zone-header { font-size:0.75rem; font-family:'Fira Sans',sans-serif; color:#c8b878; letter-spacing:1px; text-transform:uppercase; padding:12px 14px 4px; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(200,180,100,0.04); }
.launch-item { padding:11px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.launch-item:last-child { border-bottom:none; }
.launch-name { font-size:0.85rem; line-height:1.3; }
.launch-detail { font-size:0.7rem; color:#7a7a9a; font-family:'Fira Sans',sans-serif; margin-top:2px; }
.launch-when { font-size:0.72rem; font-family:'Fira Sans',sans-serif; color:#c8b878; }

nav.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);

  padding:8px 2px 26px;
  display:flex; justify-content:space-around; z-index:10;
  border-top:1px solid rgba(255,255,255,0.05);

button { background:none; border:none; color:inherit; cursor:pointer; }
.nav-btn { text-align:center; transition:opacity 0.2s; padding:2px 4px; min-width:46px; }
.nav-icon { font-size:1.1rem; }
.nav-label { font-size:0.58rem; font-family:'Fira Sans',sans-serif; margin-top:2px; }

.notice { font-size:0.67rem; color:#5a5a7a; text-align:center; margin-top:10px; font-style:italic; font-family:'Fira Sans',sans-serif; line-height:1.6; }
.loading-pulse { color:#6a6a8a; font-family:'Fira Sans',sans-serif; font-size:0.85rem; text-align:center; padding:30px; }

/* Animations */
@keyframes fadeIn  { from{opacity:0;transform:translateY(6px)}  to{opacity:1;transform:translateY(0)} }
@keyframes slideL  { from{opacity:0;transform:translateX(50px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideR  { from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)} }
.anim-in    { animation:fadeIn 0.28s ease-out; }
.anim-left  { animation:slideL 0.28s ease-out; }
.anim-right { animation:slideR 0.28s ease-out; }
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
.pulse { animation:pulse 1.8s ease-in-out infinite; }

function julianDate(d){
  let y=d.getUTCFullYear(),m=d.getUTCMonth()+1;
  const day=d.getUTCDate()+d.getUTCHours()/24+d.getUTCMinutes()/1440;
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524.5;
}
function norm(v){return v-Math.floor(v);}

function moonPos(jd){
  const T=(jd-2451545)/36525;
  const L0=norm((218.3164477+481267.88123421*T)/360)*360;
  const M=norm((134.9633964+477198.8675055*T)/360)*360;
  const Ms=norm((357.5291092+35999.0502909*T)/360)*360;
  const D=norm((297.8501921+445267.1114034*T)/360)*360;
  const F=norm((93.2720950+483202.0175233*T)/360)*360;
  const lon=L0+6.289*Math.sin(M*DEG)-1.274*Math.sin((2*D-M)*DEG)
    -0.658*Math.sin(2*D*DEG)-0.214*Math.sin(2*M*DEG)-0.186*Math.sin(Ms*DEG)
    -0.114*Math.sin(2*F*DEG)+0.059*Math.sin((2*D-2*M)*DEG);
  const dist=385001-20905*Math.cos(M*DEG)-3699*Math.cos((2*D-M)*DEG)
    -2956*Math.cos(2*D*DEG)-570*Math.cos(2*M*DEG);
  return{longitude:((lon%360)+360)%360,distance:dist};
}
function sunPos(jd){
  const T=(jd-2451545)/36525;
  const L0=280.46646+36000.76983*T,M=357.52911+35999.05029*T;
  const C=(1.914602-0.004817*T)*Math.sin(M*DEG)+0.019993*Math.sin(2*M*DEG);
  return{longitude:((L0+C)%360+360)%360};
}

function getMoonPhase(date){
  const jd=julianDate(date),moon=moonPos(jd),sun=sunPos(jd);
  let e=moon.longitude-sun.longitude; if(e<0)e+=360;
  const illum=(1+Math.cos((180-e)*DEG))/2*100, age=e/12.1908;
  let name,emoji;
  if(e<11.25||e>348.75){name='Nouvelle Lune';emoji='🌑';}
  else if(e<78.75){name='Croissant croissant';emoji='🌒';}
  else if(e<101.25){name='Premier Quartier';emoji='🌓';}
  else if(e<168.75){name='Gibbeuse croissante';emoji='🌔';}
  else if(e<191.25){name='Pleine Lune';emoji='🌕';}
  else if(e<258.75){name='Gibbeuse décroissante';emoji='🌖';}
  else if(e<281.25){name='Dernier Quartier';emoji='🌗';}
  else{name='Croissant décroissant';emoji='🌘';}
  return{elongation:e,illumination:illum,age,phaseName:name,phaseEmoji:emoji,distance:moon.distance};
}

function getMoonSpecials(date){
  const ph=getMoonPhase(date),sp=[];

    if(ph.distance>404000) sp.push({icon:'🌕',label:'Micro Lune',detail:`Distance : ${Math.round(ph.distance).toLocaleString('fr-FR')} km`});
    const y=date.getFullYear(),m=date.getMonth();
    let fc=0,fd=null;
    for(let d=1;d<=31;d++){try{const dd=new Date(y,m,d);if(dd.getMonth()!==m)break;const p=getMoonPhase(dd);if(p.elongation>168&&p.elongation<191){fc++;if(!fd)fd=d;}}catch(e){}}
    if(fc>=2&&date.getDate()!==fd) sp.push({icon:'🔵🌕',label:'Lune Bleue',detail:'Deuxième pleine lune du mois'});
    sp.push({icon:'🌕',label:MOON_NAMES[date.getMonth()],detail:'Nom traditionnel'});
  }
  return sp;
}

function getPlanetVisibility(date){

  const res={};
  ['mercury','venus','mars','jupiter','saturn'].forEach(p=>{
    const evs=PLANET_EVENTS.filter(e=>e.p===p).map(e=>({...e,ts:new Date(e.d).getTime()})).sort((a,b)=>a.ts-b.ts);
    if(!evs.length)return;
    let before=evs[0],after=evs[evs.length-1];
    for(let i=0;i<evs.length;i++){if(evs[i].ts<=ts)before=evs[i];if(evs[i].ts>ts&&before!==evs[i]){after=evs[i];break;}}
    let elong;
    if(before.ts===after.ts){elong=before.e;}
    else{const frac=(ts-before.ts)/(after.ts-before.ts);let e0=before.e,e1=after.e;if(Math.abs(e1-e0)>270){if(e0>0)e1+=360;else e0+=360;}elong=e0+(e1-e0)*frac;if(elong>180)elong-=360;if(elong<-180)elong+=360;}
    const abs=Math.abs(elong);
    let vis,badge,detail;
    if(abs<18){vis='invisible';badge='badge-non';detail='Trop proche du Soleil';}
    else if(elong>0){vis='soir';badge='badge-soir';detail=abs>150?`Opposition — ${abs.toFixed(0)}° Est (toute la nuit)`:`${abs.toFixed(0)}° Est du Soleil — visible le soir`;}
    else{vis='matin';badge='badge-matin';detail=`${abs.toFixed(0)}° Ouest du Soleil — visible le matin`;}
    res[p]={...meta[p],elong,visibility:vis,badge,detail};
  });
  return res;
}

function getSunTimesRaw(date,lat,lon){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  const n1=Math.floor(275*m/9),n2=Math.floor((m+9)/12),n3=1+Math.floor((y-4*Math.floor(y/4)+2)/3);
  const N=n1-n2*n3+d-30,lh=lon/15,tz=-date.getTimezoneOffset()/60;
  function ct(isRise,zen){
    const t=isRise?N+(6-lh)/24:N+(18-lh)/24,M=0.9856*t-3.289;
    let L=M+1.916*Math.sin(M*DEG)+0.020*Math.sin(2*M*DEG)+282.634;L=((L%360)+360)%360;
    let RA=Math.atan(0.91764*Math.tan(L*DEG))*RAD;RA=((RA%360)+360)%360;RA=(RA+(Math.floor(L/90)*90-Math.floor(RA/90)*90))/15;
    const sd=0.39782*Math.sin(L*DEG),cd=Math.cos(Math.asin(sd));
    const cH=(Math.cos(zen*DEG)-sd*Math.sin(lat*DEG))/(cd*Math.cos(lat*DEG));
    if(cH>1||cH<-1)return null;
    let H=isRise?360-Math.acos(cH)*RAD:Math.acos(cH)*RAD;
    const T=H/15+RA-0.06571*t-6.622,UT=((T-lh)%24+24)%24,loc=(UT+tz+24)%24;
    const hh=Math.floor(loc),mm=Math.floor((loc-hh)*60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  const r=ct(true,90.833),s=ct(false,90.833);
  return(r&&s)?{rise:r,set:s}:null;
}

function getSunTimes(date,lat,lon){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  const n1=Math.floor(275*m/9),n2=Math.floor((m+9)/12),n3=1+Math.floor((y-4*Math.floor(y/4)+2)/3);
  const N=n1-n2*n3+d-30,lh=lon/15,tz=-date.getTimezoneOffset()/60;
  function ct(isRise,zen){
    const t=isRise?N+(6-lh)/24:N+(18-lh)/24,M=0.9856*t-3.289;
    let L=M+1.916*Math.sin(M*DEG)+0.020*Math.sin(2*M*DEG)+282.634;L=((L%360)+360)%360;
    let RA=Math.atan(0.91764*Math.tan(L*DEG))*RAD;RA=((RA%360)+360)%360;RA=(RA+(Math.floor(L/90)*90-Math.floor(RA/90)*90))/15;
    const sd=0.39782*Math.sin(L*DEG),cd=Math.cos(Math.asin(sd));
    const cH=(Math.cos(zen*DEG)-sd*Math.sin(lat*DEG))/(cd*Math.cos(lat*DEG));
    if(cH>1||cH<-1)return null;
    let H=isRise?360-Math.acos(cH)*RAD:Math.acos(cH)*RAD;
    const T=H/15+RA-0.06571*t-6.622,UT=((T-lh)%24+24)%24,loc=(UT+tz+24)%24;
    const hh=Math.floor(loc),mm=Math.floor((loc-hh)*60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  const rise=ct(true,90.833),set=ct(false,90.833);
  const civilEnd=ct(false,96),nautEnd=ct(false,102),astroEnd=ct(false,108),astroStart=ct(true,108);
  let duration='--h--',delta=null;
  if(rise&&set){
    const [rh,rm]=rise.split(':').map(Number),[sh,sm]=set.split(':').map(Number);
    const tot=(sh*60+sm)-(rh*60+rm);
    duration=`${Math.floor(tot/60)}h${String(tot%60).padStart(2,'0')}`;
    const ps=getSunTimesRaw(new Date(date.getTime()-86400000),lat,lon);
    if(ps){const [prh,prm]=ps.rise.split(':').map(Number),[psh,psm]=ps.set.split(':').map(Number);delta=tot-((psh*60+psm)-(prh*60+prm));}
  }
  return{rise:rise||'--:--',set:set||'--:--',duration,delta,civilEnd,nautEnd,astroEnd,astroStart};
}

function tidalCoeff(date){
  const jd=julianDate(date),moon=moonPos(jd),sun=sunPos(jd);
  let e=moon.longitude-sun.longitude;if(e<0)e+=360;
  const mf=385000/moon.distance,sy=Math.cos(e*DEG);
  return Math.min(120,Math.max(20,Math.round(45+75*Math.pow(mf,3)*(0.5+0.5*Math.abs(sy)))));
}
function coeffColor(c){return c>=95?'#e05050':c>=70?'#e09030':c>=45?'#c8b878':'#6090c0';}
function coeffLabel(c){return c>=95?'Grande vive-eau':c>=70?'Forte marée':c>=45?'Marée moyenne':'Morte-eau';}

function getObsScore(date){
  const ph=getMoonPhase(date),ms=Math.round(5*(1-ph.illumination/100));
  const doy=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const ss=doy>90&&doy<270?2:4;
  const s=Math.min(5,Math.round((ms*3+ss*2)/5));
  return{score:s,label:['Mauvaise','Médiocre','Bonne','Très bonne','Excellente'][s]};
}

function getUpcomingPhases(date){
  const phases=[],found={};
  const targets=[
    {name:'Nouvelle Lune 🌑',test:e=>e<11.25||e>348.75},
    {name:'Premier Quartier 🌓',test:e=>e>78&&e<108},
    {name:'Pleine Lune 🌕',test:e=>e>165&&e<195},
    {name:'Dernier Quartier 🌗',test:e=>e>258&&e<288},
  ];
  let d=new Date(date.getTime()+86400000);
  for(let i=0;i<35&&Object.keys(found).length<4;i++){
    const ph=getMoonPhase(d);
    targets.forEach(t=>{if(!found[t.name]&&t.test(ph.elongation)){found[t.name]={name:t.name,date:new Date(d)};phases.push(found[t.name]);}});
    d=new Date(d.getTime()+86400000);
  }
  return phases.sort((a,b)=>a.date-b.date);
}

// API : MÉTÉO & LANCEMENTS
// ═══════════════════════════════════════════════════════════════════
async function fetchWeather(lat,lon){
  const now=Date.now();
  if(wx.data&&wx.lat===lat&&wx.lon===lon&&(now-wx.ts)<1800000)return wx.data;
  if(wx.loading)return null;
  wx.loading=true;
  try{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'auto';
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&hourly=temperature_2m,cloud_cover,visibility,wind_speed_10m&forecast_days=3&timezone=${encodeURIComponent(tz)}`;
    const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();wx.data=d;wx.lat=lat;wx.lon=lon;wx.ts=now;return d;
  }catch(e){console.warn('Météo:',e.message);return null;}
  finally{wx.loading=false;}
}

async function fetchLaunches(){
  const now=Date.now();
  if(spx.data&&(now-spx.ts)<3600000)return spx.data;
  if(spx.loading)return null;
  spx.loading=true;
  try{
    const r=await fetch('https://ll.thespacedevs.com/2.2.0/launch/upcoming/?format=json&limit=10&mode=list');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();spx.data=d;spx.ts=now;return d;
  }catch(e){console.warn('Launches:',e.message);return null;}
  finally{spx.loading=false;}
}

function extractNightHours(data,date,sunsetH,sunriseH){
  if(!data?.hourly)return[];
  const todayStr=date.toISOString().slice(0,10);
  const tomorrowStr=new Date(date.getTime()+86400000).toISOString().slice(0,10);
  return data.hourly.time.reduce((acc,t,i)=>{
    const ds=t.slice(0,10),h=parseInt(t.slice(11,13));
    if((ds===todayStr&&h>=sunsetH)||(ds===tomorrowStr&&h<=sunriseH))
      acc.push({time:t.slice(11,16),cloud:data.hourly.cloud_cover[i]??0,vis:data.hourly.visibility[i]??25000,wind:data.hourly.wind_speed_10m[i]??0,temp:data.hourly.temperature_2m[i]??10});
    return acc;
  },[]);
}

function hourScore(cloud,vis,wind){
  let s=5;
  if(cloud>80)s-=3;else if(cloud>50)s-=2;else if(cloud>20)s-=1;
  if(vis<3000)s-=2;else if(vis<10000)s-=1;
  if(wind>40)s-=1;
  return Math.max(0,s);
}
function scoreCol(s){return s>=5?'#50d080':s>=4?'#a0d050':s>=3?'#c8b878':s>=2?'#e09030':'#e05050';}
function scoreLbl(s){return['Mauvaise','Médiocre','Bonne','Très bonne','Excellente'][Math.min(4,s)];}

  const lon=((L0+C)%360+360)%360,decl=Math.asin(0.39782*Math.sin(lon*DEG))*RAD;

    const launches=spx.data.results.slice(0,8);
    launchCount=`${launches.length} à venir`;
    launchContent=launches.map(l=>{
      const dt=new Date(l.net),diff=Math.round((dt-new Date())/86400000);
      const when=diff<0?'Passé':diff===0?'Aujourd\'hui':diff===1?'Demain':`Dans ${diff}j`;
      const sCol=l.status?.abbrev==='Go'?'#50d080':l.status?.abbrev==='TBD'?'#c8b878':'#9a9aaa';
      const dateStr=dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
      return`<div class="launch-item"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;"><div class="launch-name">${l.name}</div>
          <div class="launch-detail">${l.launch_service_provider?.name||''} · ${l.pad?.location?.name||''}</div>
          ${l.mission?.type?`<div class="launch-detail">${l.mission.type}</div>`:''}
        </div>
        <div style="text-align:right;min-width:65px;">
          <div class="launch-when">${dateStr}</div>
          <div class="sans" style="font-size:0.65rem;color:#6a6a8a;">${when}</div>
          <div class="sans" style="font-size:0.62rem;color:${sCol};margin-top:2px;">${l.status?.name||'TBD'}</div>
        </div>
      </div></div>`;
    }).join('')+`<div style="padding:6px 14px;"><p class="notice" style="margin:0;">Source : Launch Library 2 (thespacedevs.com)</p></div>`;
  } else {
    launchCount='hors ligne';
    launchContent=`<div class="launch-item" style="color:#6a6a8a;font-family:'Fira Sans',sans-serif;font-size:0.85rem;">${spx.loading?'⏳ Chargement…':'Données indisponibles hors connexion.'}</div>`;
  }

  const zones=[
    {key:'moon',label:'🌕 Missions Lunaires'},
    {key:'mars',label:'🔴 Missions Mars'},
    {key:'iss', label:'🛸 ISS & Stations orbitales'},
  ];

  const missionsHTML=zones.map(z=>{
    const ms=MISSIONS.filter(m=>m.zone===z.key);
    const content=ms.map(m=>`<div class="mission-card">
      <div class="mission-name">${m.icon} ${m.name}</div>
      <div class="mission-agency">${m.agency} · ${m.date}</div>
      <div class="mission-desc">${m.desc}</div>
      <span class="mission-badge ${m.badge}">${m.status}</span>
    </div>`).join('');
    const active=ms.filter(m=>m.status==='En cours').length;
    const upcoming=ms.filter(m=>m.status==='À venir'||m.status==='Planifié').length;
    const count=`${active} en cours · ${upcoming} à venir`;
    return accordion(z.key,z.label,content,count);
  }).join('');

  return `<div class="anim-in">
    ${accordion('launches','🚀 Prochains lancements — temps réel',launchContent,launchCount)}
    ${missionsHTML}
    <p class="notice" style="margin-top:12px;">Missions : données vérifiées mi-2025. Lancements : temps réel via Launch Library 2.</p>
  </div>`;
}

let skyCanvas=null, skyCtx=null, skyZoom=1, skyOffX=0, skyOffY=0;
let skyDragging=false, skyLastX=0, skyLastY=0, skyPinchDist=0;
let skyAnimId=null;

function siderealTime(date,lon){
  const jd=2451545+(date-new Date('2000-01-01T12:00:00Z'))/86400000;
  const T=(jd-2451545)/36525;
  let st=280.46061837+360.98564736629*jd+0.000387933*T*T;
  return((st+lon)%360+360)%360;
}

function eqToHz(ra_h,dec_d,lat,lst){
  const ha=(lst-ra_h*15+360)%360*DEG,d=dec_d*DEG,l=lat*DEG;
  const sinAlt=Math.sin(d)*Math.sin(l)+Math.cos(d)*Math.cos(l)*Math.cos(ha);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinAlt)))*RAD;
  const cosAz=(Math.sin(d)-sinAlt*Math.sin(l))/(Math.cos(Math.asin(sinAlt))*Math.cos(l));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*RAD;
  if(Math.sin(ha)>0)az=360-az;
  return{alt,az};
}

function skyProject(alt,az,R){
  if(alt<-10)return null;
  const r=R*(90-Math.max(0,alt))/90;
  return{x:Math.sin(az*DEG)*r,y:-Math.cos(az*DEG)*r};
}

function drawSky(){
  if(!skyCanvas||!skyCtx)return;
  const W=skyCanvas.width,H=skyCanvas.height,R=Math.min(W,H)*0.46;
  skyCtx.clearRect(0,0,W,H);
  skyCtx.save();
  skyCtx.translate(W/2+skyOffX,H/2+skyOffY);
  skyCtx.scale(skyZoom,skyZoom);

  // Fond
  const bg=skyCtx.createRadialGradient(0,0,0,0,0,R);
  bg.addColorStop(0,'#0d1030');bg.addColorStop(0.7,'#08081a');bg.addColorStop(1,'#050510');
  skyCtx.beginPath();skyCtx.arc(0,0,R,0,Math.PI*2);
  skyCtx.fillStyle=bg;skyCtx.fill();
  skyCtx.strokeStyle='rgba(200,180,120,0.15)';skyCtx.lineWidth=1;skyCtx.stroke();

  // Grille altitude 30°/60°
  skyCtx.strokeStyle='rgba(255,255,255,0.04)';skyCtx.lineWidth=0.5;
  [30,60].forEach(a=>{
    const r=R*(90-a)/90;
    skyCtx.beginPath();skyCtx.arc(0,0,r,0,Math.PI*2);skyCtx.stroke();
    skyCtx.fillStyle='rgba(150,140,110,0.4)';skyCtx.font=`${Math.round(13/skyZoom)}px Fira Sans`;
    skyCtx.textAlign='left';skyCtx.textBaseline='middle';
    skyCtx.fillText(a+'°',4,-(r)+4);
  });
  // Rayons azimutaux
  [0,30,60,90,120,150,180,210,240,270,300,330].forEach(az=>{
    const x=Math.sin(az*DEG)*R,y=-Math.cos(az*DEG)*R;
    skyCtx.beginPath();skyCtx.moveTo(0,0);skyCtx.lineTo(x,y);skyCtx.stroke();
  });

  const now=new Date(),lst=siderealTime(now,state.lon);

  // Voie lactée (approximation elliptique)
  skyCtx.save();
  const galCenter=eqToHz(17.76,-29,state.lat,lst);
  if(galCenter.alt>-30){
    const gc=skyProject(galCenter.alt,galCenter.az,R);
    if(gc){
      const gr=skyCtx.createRadialGradient(gc.x,gc.y,0,gc.x,gc.y,R*0.5);
      gr.addColorStop(0,'rgba(180,180,220,0.06)');
      gr.addColorStop(1,'rgba(0,0,0,0)');
      skyCtx.beginPath();skyCtx.arc(gc.x,gc.y,R*0.5,0,Math.PI*2);
      skyCtx.fillStyle=gr;skyCtx.fill();
    }
  }
  skyCtx.restore();

  // Constellations
  SKY_CONST.forEach(c=>{
    skyCtx.strokeStyle=`rgba(${parseInt(c.c.slice(1,3),16)},${parseInt(c.c.slice(3,5),16)},${parseInt(c.c.slice(5,7),16)},0.3)`;
    skyCtx.lineWidth=0.7/skyZoom;
    for(let i=0;i<c.l.length-1;i+=2){
      const h1=eqToHz(c.l[i][0],c.l[i][1],state.lat,lst);
      const h2=eqToHz(c.l[i+1][0],c.l[i+1][1],state.lat,lst);
      const p1=skyProject(h1.alt,h1.az,R),p2=skyProject(h2.alt,h2.az,R);
      if(p1&&p2){skyCtx.beginPath();skyCtx.moveTo(p1.x,p1.y);skyCtx.lineTo(p2.x,p2.y);skyCtx.stroke();}
    }
  });

  // Étoiles
  SKY_STARS.forEach(([ra,dec,mag,name])=>{
    const h=eqToHz(ra,dec,state.lat,lst),p=skyProject(h.alt,h.az,R);
    if(!p)return;
    const r=Math.max(0.4,1.8-(mag+1)*0.28)/skyZoom;
    const br=Math.max(0.3,Math.min(1,(5.5-mag)/5.5));
    // Couleur selon température approx (simplifié)
    const col=mag<0?`rgba(200,220,255,${br})`:mag<1?`rgba(220,230,255,${br})`:`rgba(235,235,220,${br})`;
    skyCtx.beginPath();skyCtx.arc(p.x,p.y,r,0,Math.PI*2);
    skyCtx.fillStyle=col;skyCtx.fill();
    // Halo pour étoiles brillantes
    if(mag<1.5){
      const g=skyCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4/skyZoom);
      g.addColorStop(0,`rgba(200,210,255,${br*0.25})`);g.addColorStop(1,'rgba(0,0,0,0)');
      skyCtx.beginPath();skyCtx.arc(p.x,p.y,r*4/skyZoom,0,Math.PI*2);skyCtx.fillStyle=g;skyCtx.fill();
    }
    // Nom étoiles très brillantes
    if(mag<0.5&&skyZoom>0.7){
      skyCtx.fillStyle=`rgba(200,180,120,${br*0.85})`;
      const fs=Math.round(14/skyZoom);
      skyCtx.font=`${fs}px Fira Sans`;
      skyCtx.textAlign='left';skyCtx.textBaseline='middle';
      skyCtx.fillText(name,p.x+r+3/skyZoom,p.y);
    } else if(mag<1.5&&skyZoom>1.5){
      skyCtx.fillStyle=`rgba(180,165,110,${br*0.7})`;
      const fs=Math.round(13/skyZoom);
      skyCtx.font=`${fs}px Fira Sans`;
      skyCtx.textAlign='left';skyCtx.textBaseline='middle';
      skyCtx.fillText(name,p.x+r+2/skyZoom,p.y);
    }
  });

  // Planètes visibles (positions approx depuis getPlanetVisibility)
  const planData={venus:{ra:null,dec:null,col:'#ffe080',label:'Vénus'},mars:{ra:null,dec:null,col:'#ff8060',label:'Mars'},jupiter:{ra:null,dec:null,col:'#c8b890',label:'Jupiter'},saturn:{ra:null,dec:null,col:'#d0c080',label:'Saturne'}};
  // Positions approximatives planètes (interpolation simple)
  const jd2=julianDate(now),T2=(jd2-2451545)/36525;
  // Vénus - longitude écliptique approx
  const Lv=((181.979801+58517.8156760*T2)%360+360)%360;
  const Mv=((212.448640+58517.8091150*T2)%360+360)%360;
  const lv=Lv+0.7758*Math.sin(Mv*DEG)+0.0033*Math.sin(2*Mv*DEG);
  const sv=Math.asin(Math.sin(lv*DEG)*0.3978);
  const pv=skyProject(eqToHz(((lv*DEG-Math.acos(Math.cos(sv)*Math.cos(0)))*RAD%360+360)%360/15,sv*RAD,state.lat,lst).alt,eqToHz(0,sv*RAD,state.lat,lst).az,R);

  // Affichage Lune
  const moonH=getMoonPhase(now);
  const moonRA=sunPos(julianDate(now)).longitude+moonH.elongation;
  const moonDecl=Math.asin(Math.sin((moonRA%360)*DEG)*0.3978)*RAD;
  const mHz=eqToHz(((moonRA%360+360)%360)/15,moonDecl,state.lat,lst);
  const mp=skyProject(mHz.alt,mHz.az,R);
  if(mp){
    const mr=6/skyZoom;
    const mg2=skyCtx.createRadialGradient(mp.x,mp.y,0,mp.x,mp.y,mr*2);
    mg2.addColorStop(0,'rgba(240,235,200,0.9)');mg2.addColorStop(1,'rgba(0,0,0,0)');
    skyCtx.beginPath();skyCtx.arc(mp.x,mp.y,mr,0,Math.PI*2);skyCtx.fillStyle='rgba(240,235,200,0.9)';skyCtx.fill();
    skyCtx.beginPath();skyCtx.arc(mp.x,mp.y,mr*2.5,0,Math.PI*2);skyCtx.fillStyle=mg2;skyCtx.fill();
    if(skyZoom>0.6){skyCtx.fillStyle='rgba(240,235,150,0.9)';skyCtx.font=`${Math.round(14/skyZoom)}px Fira Sans`;skyCtx.textAlign='left';skyCtx.textBaseline='middle';skyCtx.fillText(moonH.phaseEmoji+' Lune',mp.x+mr+3/skyZoom,mp.y);}
  }

  // Soleil (si visible)
  const sunLon=sunPos(julianDate(now)).longitude;
  const sunDecl=Math.asin(Math.sin(sunLon*DEG)*0.3978)*RAD;
  const sHz=eqToHz(sunLon/15,sunDecl,state.lat,lst);
  const sp2=skyProject(sHz.alt,sHz.az,R);
  if(sp2){
    skyCtx.beginPath();skyCtx.arc(sp2.x,sp2.y,8/skyZoom,0,Math.PI*2);
    skyCtx.fillStyle='rgba(255,220,60,0.9)';skyCtx.fill();
    const sg=skyCtx.createRadialGradient(sp2.x,sp2.y,0,sp2.x,sp2.y,20/skyZoom);
    sg.addColorStop(0,'rgba(255,200,50,0.3)');sg.addColorStop(1,'rgba(0,0,0,0)');
    skyCtx.beginPath();skyCtx.arc(sp2.x,sp2.y,20/skyZoom,0,Math.PI*2);skyCtx.fillStyle=sg;skyCtx.fill();
    if(skyZoom>0.6){skyCtx.fillStyle='rgba(255,220,80,0.9)';skyCtx.font=`${Math.round(14/skyZoom)}px Fira Sans`;skyCtx.textAlign='left';skyCtx.textBaseline='middle';skyCtx.fillText('☀️ Soleil',sp2.x+10/skyZoom,sp2.y);}
  }

  // Points cardinaux
  const dirs=[{l:'N',az:0},{l:'E',az:90},{l:'S',az:180},{l:'O',az:270}];
  dirs.forEach(d=>{
    const x=Math.sin(d.az*DEG)*R*1.05,y=-Math.cos(d.az*DEG)*R*1.05;
    const fs=Math.round(18/skyZoom);
    skyCtx.fillStyle='rgba(200,180,120,0.9)';skyCtx.font=`bold ${fs}px Fira Sans`;
    skyCtx.textAlign='center';skyCtx.textBaseline='middle';skyCtx.fillText(d.l,x,y);
  });

  // Horizon
  skyCtx.beginPath();skyCtx.arc(0,0,R,0,Math.PI*2);
  skyCtx.strokeStyle='rgba(100,160,100,0.35)';skyCtx.lineWidth=1.5/skyZoom;skyCtx.stroke();

  skyCtx.restore();

  // Info overlay
  const h=now.getHours(),m=now.getMinutes();
  const timeStr=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  skyCtx.fillStyle='rgba(150,140,110,0.7)';
  skyCtx.font='14px Fira Sans';skyCtx.textAlign='right';skyCtx.textBaseline='bottom';
  skyCtx.fillText(`🕐 ${timeStr}  🔍 zoom: ${skyZoom.toFixed(1)}x`,W-8,H-8);
}

function renderSkyView(){
  const size=Math.min(document.body.clientWidth,window.innerHeight-180);
  return `<div class="anim-in">
    <div style="text-align:center;margin-bottom:8px;">
      <p class="sans" style="font-size:0.72rem;color:#7a7a9a;">Carte du ciel en temps réel · Zaragoza · Vue zénithale<br>
      <span style="color:#6a6a8a;">Glisser pour déplacer · Pincer pour zoomer · Double-tap pour centrer</span></p>
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:10px;">
      <canvas id="skyCanvas" width="${size}" height="${size}" style="border-radius:50%;touch-action:none;cursor:grab;max-width:100%;"></canvas>
    </div>
    <div class="section">
      <div class="row"><span class="row-label">🌕 Lune</span><span style="font-size:0.85rem;">${getMoonPhase(new Date()).phaseEmoji} ${getMoonPhase(new Date()).phaseName} — ${getMoonPhase(new Date()).illumination.toFixed(0)}%</span></div>
      <div class="row"><span class="row-label">☀️ Soleil</span><span class="sans" style="font-size:0.85rem;">${getSunTimes(new Date(),state.lat,state.lon).set} coucher</span></div>
    </div>
    <div class="section">
      <div class="section-title">Légende</div>
      <div class="row"><span class="row-label">Cercles pointillés</span><span class="sans" style="font-size:0.8rem;">30° et 60° d'altitude</span></div>
      <div class="row"><span class="row-label">Lignes bleues</span><span class="sans" style="font-size:0.8rem;">Constellations (17)</span></div>
      <div class="row"><span class="row-label">Points blancs</span><span class="sans" style="font-size:0.8rem;">~100 étoiles brillantes</span></div>
    </div>
    <p class="notice">Carte mise à jour toutes les 30 secondes. Noms visibles en zoom ≥ 1.5x.</p>
  </div>`;
}

function initSkyCanvas(){
  skyCanvas=document.getElementById('skyCanvas');
  if(!skyCanvas)return;
  skyCtx=skyCanvas.getContext('2d');
  skyZoom=1;skyOffX=0;skyOffY=0;
  if(skyAnimId)clearInterval(skyAnimId);
  drawSky();
  skyAnimId=setInterval(drawSky,30000);

  // Interactions souris
  skyCanvas.addEventListener('mousedown',e=>{skyDragging=true;skyLastX=e.clientX;skyLastY=e.clientY;skyCanvas.style.cursor='grabbing';});
  skyCanvas.addEventListener('mousemove',e=>{if(!skyDragging)return;skyOffX+=e.clientX-skyLastX;skyOffY+=e.clientY-skyLastY;skyLastX=e.clientX;skyLastY=e.clientY;drawSky();});
  skyCanvas.addEventListener('mouseup',()=>{skyDragging=false;skyCanvas.style.cursor='grab';});
  skyCanvas.addEventListener('wheel',e=>{e.preventDefault();skyZoom=Math.max(0.4,Math.min(10,skyZoom*(1-e.deltaY*0.001)));drawSky();},{passive:false});
  skyCanvas.addEventListener('dblclick',()=>{skyZoom=1;skyOffX=0;skyOffY=0;drawSky();});

  // Interactions tactiles
  let tp=[];
  skyCanvas.addEventListener('touchstart',e=>{
    tp=[...e.touches];
    if(e.touches.length===1){skyDragging=true;skyLastX=e.touches[0].clientX;skyLastY=e.touches[0].clientY;}
    if(e.touches.length===2){skyPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:true});
  skyCanvas.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      skyZoom=Math.max(0.4,Math.min(10,skyZoom*d/skyPinchDist));skyPinchDist=d;
    } else if(e.touches.length===1&&skyDragging){
      skyOffX+=e.touches[0].clientX-skyLastX;skyOffY+=e.touches[0].clientY-skyLastY;
      skyLastX=e.touches[0].clientX;skyLastY=e.touches[0].clientY;
    }
    drawSky();
  },{passive:true});
  skyCanvas.addEventListener('touchend',e=>{if(e.touches.length===0)skyDragging=false;tp=[...e.touches];},{passive:true});
}


// RENDU : CALENDRIER
// ═══════════════════════════════════════════════════════════════════
function renderCalendarView(){
  const now=new Date(),vd=new Date(now.getFullYear(),now.getMonth()+state.calOffset,1);
  const year=vd.getFullYear(),month=vd.getMonth(),lastDay=new Date(year,month+1,0).getDate();
  const startPad=(new Date(year,month,1).getDay()+6)%7;
  const monthName=vd.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const ms=new Date(year,month,1).getTime(),me=new Date(year,month+1,0).getTime()+86399999;
  const mev=ASTRO_EVENTS.filter(e=>{const t=new Date(e.d).getTime();return t>=ms&&t<=me;});
  let h=`<div class="anim-in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <button onclick="state.calOffset--;render()" style="font-size:1.4rem;padding:4px 12px;color:#d0c8b0;">‹</button>
      <span class="sans" style="font-size:1rem;text-transform:capitalize;">${monthName}</span>
      <button onclick="state.calOffset++;render()" style="font-size:1.4rem;padding:4px 12px;color:#d0c8b0;">›</button>
    </div><div class="cal-grid">`;
  ['L','M','M','J','V','S','D'].forEach(d=>h+=`<div class="sans" style="color:#5a5a7a;font-size:0.72rem;padding-bottom:8px;text-align:center;">${d}</div>`);
  for(let i=0;i<startPad;i++)h+=`<div></div>`;
  for(let d=1;d<=lastDay;d++){
    const sel=state.selectedDate.getDate()===d&&state.selectedDate.getMonth()===month&&state.selectedDate.getFullYear()===year;
    const tod=now.getDate()===d&&now.getMonth()===month&&now.getFullYear()===year;
    const dd=new Date(year,month,d),ph=getMoonPhase(dd);
    const hasEv=ASTRO_EVENTS.some(e=>new Date(e.d).toDateString()===dd.toDateString());
    const sp=getMoonSpecials(dd),isSM=sp.some(s=>s.label==='Super Lune');
    h+=`<div class="cal-cell ${sel?'selected':''} ${tod?'today':''}" onclick="selectDate(${year},${month},${d})">
      <div style="font-size:${isSM?'1.1rem':'0.9rem'};${isSM?'text-shadow:0 0 8px rgba(255,220,100,0.8);':''}text-align:center;">${ph.phaseEmoji}</div>
      <div class="cal-day sans" style="font-size:0.65rem;margin-top:2px;text-align:center;">${d}</div>
      ${hasEv?'<div class="event-dot" style="background:#c8b878;"></div>':'<div style="height:6px;"></div>'}
    </div>`;
  }
  h+=`</div>`;
  if(mev.length) h+=`<div class="section" style="margin-top:16px;"><div class="section-title">Événements du mois</div>${mev.map(e=>`<div class="row"><span style="font-size:0.95rem;">${e.icon} ${e.title}</span><span class="sans" style="font-size:0.78rem;color:#c8b878;">${new Date(e.d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span></div>`).join('')}</div>`;
  return h+`</div>`;
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION & SWIPE
// ═══════════════════════════════════════════════════════════════════
const TABS=[
  {i:'🌙',l:'Lune',t:0},{i:'🌆',l:'Ce soir',t:1},{i:'☀️',l:'Soleil',t:2},
  {i:'🌊',l:'Marées',t:3},{i:'📋',l:'Événements',t:4},{i:'🚀',l:'Espace',t:5},
  {i:'🌌',l:'Ciel',t:6},{i:'📅',l:'Calendrier',t:7}
];
const MAX_TAB=TABS.length-1;
let swipeDir=0;

function renderNav(){
  document.getElementById('bottom-nav').innerHTML=TABS.map(tab=>`
    <button class="nav-btn" onclick="goToTab(${tab.t})" style="opacity:${state.tab===tab.t?1:0.32};">
      <div class="nav-icon">${tab.i}</div>
      <div class="nav-label">${tab.l}</div>
    </button>`).join('');
}

function goToTab(t,dir){
  swipeDir=dir!==undefined?dir:(t>state.tab?-1:t<state.tab?1:0);
  state.tab=t;render();
}

function render(){
  const d=state.selectedDate,isToday=d.toDateString()===new Date().toDateString();
  document.getElementById('current-date-display').textContent=isToday?'Aujourd\'hui':d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const tc=document.getElementById('tab-content');
  const anim=swipeDir<0?'anim-left':swipeDir>0?'anim-right':'anim-in';
  swipeDir=0;
  const asyncRender=async()=>{
    let html;
    switch(state.tab){
      case 0:html=renderMoonView();break;
      case 1:html=await renderTonightView();break;
      case 2:html=renderSunView();break;
      case 3:html=renderTidesView();break;
      case 4:html=renderEventsView();break;
      case 5:html=await renderSpaceView();break;
      case 6:html=renderSkyView();break;
      case 7:html=renderCalendarView();break;
      default:html='<div></div>';
    }
    if(html)tc.innerHTML=html.replace('class="anim-in"',`class="${anim}"`);
    renderNav();
  };
  if(state.tab===1||state.tab===5){tc.innerHTML=`<div class="${anim}"><div class="loading-pulse pulse">⏳ Chargement…</div></div>`;}
  if(state.tab===6){tc.innerHTML=`<div class="${anim}"><div class="loading-pulse pulse">🌌 Initialisation de la carte…</div></div>`;}
  asyncRender().then(()=>{
    if(state.tab===6) setTimeout(initSkyCanvas, 50);
  });
  renderNav();
}

// Swipe tactile
let tx=0,ty=0,swipeOnCanvas=false;
document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;
  // Ne pas swiper si le touch démarre sur le canvas de la carte du ciel
  swipeOnCanvas=!!(e.target&&e.target.id==='skyCanvas');
},{passive:true});
document.addEventListener('touchend',e=>{
  if(swipeOnCanvas)return; // touch sur la carte → ignorer le swipe
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&state.tab<MAX_TAB)goToTab(state.tab+1,-1);
    if(dx>0&&state.tab>0)goToTab(state.tab-1,1);
  }
},{passive:true});

function resetToToday(){state.selectedDate=new Date();state.calOffset=0;render();}
function selectDate(y,m,d){state.selectedDate=new Date(y,m,d);state.tab=0;render();}

// ═══════════════════════════════════════════════════════════════════
// INIT & GÉOLOCALISATION
// ═══════════════════════════════════════════════════════════════════
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos=>{
      state.lat=pos.coords.latitude;state.lon=pos.coords.longitude;
      const la=`${Math.abs(state.lat).toFixed(2)}°${state.lat>=0?'N':'S'}`;
      const lo=`${Math.abs(state.lon).toFixed(2)}°${state.lon>=0?'E':'O'}`;
      document.getElementById('location-text').textContent=`${la} ${lo}`;
      render();
    },
    ()=>{document.getElementById('location-text').textContent='Zaragoza (défaut)';}
  );
} else {
  document.getElementById('location-text').textContent='Zaragoza (défaut)';
}
render();
</script>

<!-- Service Worker PWA -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              const t=document.createElement('div');
              t.innerHTML='🌙 Mise à jour disponible — <strong>rechargez</strong>';
              Object.assign(t.style,{position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%)',background:'rgba(200,184,120,0.95)',color:'#08081a',padding:'10px 16px',borderRadius:'20px',fontSize:'14px',fontFamily:'Fira Sans,sans-serif',zIndex:'99',cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'});
              t.onclick=()=>window.location.reload();
              document.body.appendChild(t);
              setTimeout(()=>t.remove(),8000);
            }
          });
        });
      }).catch(e=>console.warn('SW:',e));
  });
}
</script>
