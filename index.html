<title>Luna Pro — Astronomie Interactive</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 0; }

body {
  min-height: 100vh; font-family: 'Cormorant Garamond', serif; color: #d0c8b0;
  max-width: 430px; margin: 0 auto;
  background: linear-gradient(180deg, #08081a 0%, #0d1025 40%, #121430 100%);
}
.sans { font-family: 'Fira Sans', sans-serif; }
.content { position: relative; z-index: 1; padding: 20px 16px 110px; }

/* Header */
header { text-align: center; margin-bottom: 8px; }
header h1 { font-size: 36px; font-weight: 300; letter-spacing: 6px; color: #e8dfc4; text-transform: uppercase; }
.loc { font-size: 12px; color: #6a6a8a; margin-top: 4px; }
.date-indicator {
  background: rgba(200,180,120,0.1); border: 1px solid rgba(200,180,120,0.2);
  padding: 4px 14px; border-radius: 20px; font-size: 13px; margin-top: 8px;
  display: inline-block; cursor: pointer; transition: background 0.2s;
}
.date-indicator:active { background: rgba(200,180,120,0.25); }

/* Cards */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.stat-card {
  background: rgba(255,255,255,0.03); border-radius: 14px; padding: 14px;
  text-align: center; border: 1px solid rgba(255,255,255,0.06);
}
.stat-card .lbl { font-size: 10px; color: #7a7a9a; letter-spacing: 1px; margin-bottom: 5px; font-family:'Fira Sans',sans-serif; text-transform:uppercase; }
.stat-card .val { font-size: 20px; }
.stat-card .sub { font-size: 10px; color: #5a5a7a; margin-top: 3px; font-family:'Fira Sans',sans-serif; }

/* Sections */
.section {
  background: rgba(255,255,255,0.03); border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06); margin-top: 12px; overflow: hidden;
}
.section-title {
  font-size: 11px; color: #7a7a9a; letter-spacing: 1.5px; text-transform: uppercase;
  font-family: 'Fira Sans', sans-serif; padding: 10px 14px 0;
}
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.row:last-child { border-bottom: none; }
.row-label { font-size: 13px; color: #9a9aaa; font-family:'Fira Sans',sans-serif; }
.row-value { font-size: 15px; }

/* Score observation */
.obs-score { display: flex; gap: 4px; justify-content: center; margin: 12px 0 4px; }
.obs-star { font-size: 18px; transition: opacity 0.3s; }

/* Calendrier */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; }
.cal-cell { padding: 7px 1px; border-radius: 7px; cursor: pointer; transition: 0.15s; position: relative; }
.cal-cell:active { transform: scale(0.9); }
.cal-cell.selected { border: 1px solid #c8b878; background: rgba(200,180,120,0.12); }
.cal-cell.today .cal-day { font-weight: bold; color: #fff; text-decoration: underline; }
.cal-cell .event-dot { width:4px; height:4px; border-radius:50%; margin:2px auto 0; }

/* Planètes */
.planet-row { display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.planet-row:last-child { border-bottom:none; }
.planet-icon { font-size: 24px; width: 32px; text-align:center; }
.planet-info { flex: 1; }
.planet-name { font-size: 15px; }
.planet-detail { font-size: 11px; color: #7a7a9a; font-family:'Fira Sans',sans-serif; margin-top:2px; }
.planet-badge {
  font-size: 10px; font-family:'Fira Sans',sans-serif; padding: 2px 7px;
  border-radius: 10px; font-weight: 500;
}
.badge-soir  { background:rgba(255,180,50,0.15);  color:#ffb432; border:1px solid rgba(255,180,50,0.3); }
.badge-matin { background:rgba(100,180,255,0.15); color:#64b4ff; border:1px solid rgba(100,180,255,0.3); }
.badge-non   { background:rgba(100,100,120,0.15); color:#6a6a8a; border:1px solid rgba(100,100,120,0.2); }

/* Événements spéciaux */
.event-card {
  border-radius: 12px; padding: 12px 14px; margin-top: 8px;
  border: 1px solid rgba(255,255,255,0.08); position:relative; overflow:hidden;
}
.event-glow { position:absolute; top:0; left:0; right:0; bottom:0; opacity:0.06; }

/* Coeff barre */
.coeff-bar-bg { background:rgba(255,255,255,0.05); border-radius:8px; height:8px; margin:8px 0 3px; overflow:hidden; }
.coeff-bar-fill { height:100%; border-radius:8px; transition:width 0.6s ease; }

/* Bottom nav */
nav.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:rgba(8,8,26,0.96); backdrop-filter:blur(20px);
  padding:10px 16px 28px;
  display:flex; justify-content:space-around; z-index:10;
  border-top:1px solid rgba(255,255,255,0.05);
}
button { background:none; border:none; color:inherit; cursor:pointer; }
.nav-btn { text-align:center; transition:opacity 0.2s; padding:4px 8px; }

/* Notice */
.notice { font-size:10px; color:#5a5a7a; text-align:center; margin-top:8px; font-style:italic; font-family:'Fira Sans',sans-serif; line-height:1.5; }

/* Météo / Ce soir */
.weather-bar { display:flex; gap:3px; margin:4px 0; }
.weather-slot {
  flex:1; border-radius:5px; overflow:hidden; cursor:default;
  transition: transform 0.15s;
}
.weather-slot:hover { transform: scaleY(1.05); }
.weather-slot-inner { height:40px; position:relative; }
.weather-time { font-size:9px; color:#6a6a8a; text-align:center; font-family:'Fira Sans',sans-serif; margin-top:3px; }

.score-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
.tonight-hero {
  background: radial-gradient(ellipse at 30% 30%, rgba(100,120,200,0.15), transparent 70%);
  border-radius:16px; padding:20px 16px; text-align:center; margin-bottom:14px;
  border:1px solid rgba(100,120,200,0.15);
}
.tonight-score-big { font-size:36px; font-weight:300; line-height:1; letter-spacing:4px; }
.forecast-row { display:flex; align-items:center; gap:10px; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.forecast-row:last-child { border-bottom:none; }
.fc-time { font-family:'Fira Sans',sans-serif; font-size:12px; color:#9a9aaa; min-width:38px; }
.fc-bar-bg { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.fc-bar-fill { height:100%; border-radius:3px; transition:width 0.4s; }
.fc-val { font-family:'Fira Sans',sans-serif; font-size:12px; min-width:30px; text-align:right; }

.best-window { background:rgba(100,200,120,0.08); border:1px solid rgba(100,200,120,0.2); border-radius:10px; padding:10px 14px; margin-top:10px; }
.loading-pulse { animation:pulse 1.5s ease-in-out infinite; color:#6a6a8a; font-family:'Fira Sans',sans-serif; font-size:13px; text-align:center; padding:20px; }

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.tab-page { animation:fadeIn 0.3s ease-out; }
@keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
.pulse { animation:pulse 2s ease-in-out infinite; }

// ═══════════════════════════════════════════════════════════════════
// CALCULS ASTRONOMIQUES CORE
// ═══════════════════════════════════════════════════════════════════

function julianDate(d) {
  let y=d.getUTCFullYear(), m=d.getUTCMonth()+1;
  const day=d.getUTCDate()+d.getUTCHours()/24+d.getUTCMinutes()/1440+d.getUTCSeconds()/86400;
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524.5;
}
function norm(v) { return v-Math.floor(v); }

function moonPos(jd) {
  const T=(jd-2451545)/36525;
  const L0=norm((218.3164477+481267.88123421*T)/360)*360;
  const M =norm((134.9633964+477198.8675055*T)/360)*360;
  const Ms=norm((357.5291092+35999.0502909*T)/360)*360;
  const D =norm((297.8501921+445267.1114034*T)/360)*360;
  const F =norm((93.2720950+483202.0175233*T)/360)*360;
  const lon=L0+6.289*Math.sin(M*DEG)-1.274*Math.sin((2*D-M)*DEG)
    -0.658*Math.sin(2*D*DEG)-0.214*Math.sin(2*M*DEG)-0.186*Math.sin(Ms*DEG)
    -0.114*Math.sin(2*F*DEG)+0.059*Math.sin((2*D-2*M)*DEG)
    +0.057*Math.sin((2*D-Ms-M)*DEG)+0.053*Math.sin((2*D+M)*DEG)
    +0.046*Math.sin((2*D-Ms)*DEG)-0.041*Math.sin((Ms-M)*DEG)
    -0.035*Math.sin(D*DEG)-0.031*Math.sin((M+Ms)*DEG);
  const dist=385001-20905*Math.cos(M*DEG)-3699*Math.cos((2*D-M)*DEG)
    -2956*Math.cos(2*D*DEG)-570*Math.cos(2*M*DEG)+246*Math.cos((2*M-2*D)*DEG);
  return {longitude:((lon%360)+360)%360, distance:dist};
}

function sunPos(jd) {
  const T=(jd-2451545)/36525;
  const L0=280.46646+36000.76983*T, M=357.52911+35999.05029*T;
  const C=(1.914602-0.004817*T)*Math.sin(M*DEG)+0.019993*Math.sin(2*M*DEG);
  return {longitude:((L0+C)%360+360)%360};
}

function getMoonPhase(date) {
  const jd=julianDate(date), moon=moonPos(jd), sun=sunPos(jd);
  let elong=moon.longitude-sun.longitude; if(elong<0)elong+=360;
  const illum=(1+Math.cos((180-elong)*DEG))/2*100;
  const age=elong/12.1908;
  let phaseName, phaseEmoji;
  if(elong<11.25)      {phaseName='Nouvelle Lune';          phaseEmoji='🌑';}
  else if(elong<78.75) {phaseName='Croissant croissant';    phaseEmoji='🌒';}
  else if(elong<101.25){phaseName='Premier Quartier';       phaseEmoji='🌓';}
  else if(elong<168.75){phaseName='Gibbeuse croissante';    phaseEmoji='🌔';}
  else if(elong<191.25){phaseName='Pleine Lune';            phaseEmoji='🌕';}
  else if(elong<258.75){phaseName='Gibbeuse décroissante';  phaseEmoji='🌖';}
  else if(elong<281.25){phaseName='Dernier Quartier';       phaseEmoji='🌗';}
  else if(elong<348.75){phaseName='Croissant décroissant';  phaseEmoji='🌘';}
  else                 {phaseName='Nouvelle Lune';          phaseEmoji='🌑';}
  return {elongation:elong, illumination:illum, age, phaseName, phaseEmoji, distance:moon.distance};
}

// Événements lunaires spéciaux pour une date
function getMoonSpecials(date) {
  const ph = getMoonPhase(date);
  const specials = [];

  // Super lune : pleine lune + distance < 362 000 km
  if(ph.elongation>168 && ph.elongation<191 && ph.distance<362000) {
    specials.push({icon:'🌕✨', label:'Super Lune', detail:`Distance : ${Math.round(ph.distance).toLocaleString('fr-FR')} km`});
  }
  // Micro lune : pleine lune + distance > 404 000 km
  if(ph.elongation>168 && ph.elongation<191 && ph.distance>404000) {
    specials.push({icon:'🌕', label:'Micro Lune', detail:`Distance : ${Math.round(ph.distance).toLocaleString('fr-FR')} km`});
  }
  // Lune bleue : deuxième pleine lune du mois
  if(ph.elongation>168 && ph.elongation<191) {
    // Chercher s'il y a eu une autre pleine lune ce mois
    const y=date.getFullYear(), m=date.getMonth();
    let fullCount=0, firstFull=null;
    for(let d=1; d<=31; d++) {
      try {
        const dd=new Date(y,m,d);
        if(dd.getMonth()!==m) break;
        const p=getMoonPhase(dd);
        if(p.elongation>168 && p.elongation<191) {
          fullCount++;
          if(!firstFull) firstFull=d;
        }
      } catch(e){}
    }
    if(fullCount>=2 && date.getDate()!==firstFull) {
      specials.push({icon:'🔵🌕', label:'Lune Bleue', detail:'Deuxième pleine lune du mois'});
    }
  }
  // Nom traditionnel (pleine lune)
  if(ph.elongation>168 && ph.elongation<191) {
    const name = MOON_NAMES[date.getMonth()];
    specials.push({icon:'🌕', label:name, detail:'Nom traditionnel de cette pleine lune'});
  }
  // Nouvelle lune noire : deuxième nouvelle lune du mois
  if(ph.elongation<11.25 || ph.elongation>348.75) {
    const y=date.getFullYear(), m=date.getMonth();
    let newCount=0, firstNew=null;
    for(let d=1; d<=31; d++) {
      try {
        const dd=new Date(y,m,d);
        if(dd.getMonth()!==m) break;
        const p=getMoonPhase(dd);
        if(p.elongation<11.25||p.elongation>348.75) {
          newCount++;
          if(!firstNew) firstNew=d;
        }
      } catch(e){}
    }
    if(newCount>=2 && date.getDate()!==firstNew) {
      specials.push({icon:'⚫🌑', label:'Lune Noire', detail:'Deuxième nouvelle lune du mois'});
    }
  }
  return specials;
}

// ═══════════════════════════════════════════════════════════════════
// VISIBILITÉ PLANÈTES (interpolation entre événements clés)
// ═══════════════════════════════════════════════════════════════════

function getPlanetVisibility(date) {
  const ts = date.getTime();
  const planets = {
    mercury: {name:'Mercure', icon:'☿', color:'#c8a868'},
    venus:   {name:'Vénus',   icon:'♀', color:'#ffe080'},
    mars:    {name:'Mars',    icon:'♂', color:'#e06040'},
    jupiter: {name:'Jupiter', icon:'♃', color:'#c8b890'},
    saturn:  {name:'Saturne', icon:'♄', color:'#d0c090'},
  };

  const result = {};
  Object.keys(planets).forEach(p => {
    // Filtrer les événements de cette planète, triés par date
    const evs = PLANET_EVENTS.filter(e=>e.p===p).map(e=>({...e, ts:new Date(e.d).getTime()})).sort((a,b)=>a.ts-b.ts);
    if(!evs.length) return;

    // Trouver l'intervalle encadrant la date
    let before=null, after=null;
    for(let i=0;i<evs.length;i++) {
      if(evs[i].ts<=ts) before=evs[i];
      if(evs[i].ts>ts && !after) after=evs[i];
    }
    if(!before) before=evs[0];
    if(!after) after=evs[evs.length-1];

    // Interpolation linéaire de l'élongation
    let elong;
    if(before.ts===after.ts) {
      elong=before.e;
    } else {
      const frac=(ts-before.ts)/(after.ts-before.ts);
      let e0=before.e, e1=after.e;
      // Gérer la discontinuité autour des conjonctions inférieures (saute de +180 à -180)
      if(Math.abs(e1-e0)>270) {
        if(e0>0) e1+=360; else e0+=360;
      }
      elong=e0+(e1-e0)*frac;
      if(elong>180) elong-=360;
      if(elong<-180) elong+=360;
    }

    const absE=Math.abs(elong);
    let visibility, badge, detail;
    if(absE<18) {
      visibility='invisible'; badge='badge-non';
      detail='Trop proche du Soleil';
    } else if(elong>18) {
      visibility='soir'; badge='badge-soir';
      if(absE>150) detail=`Opposition — ${absE.toFixed(0)}° Est (toute la nuit)`;
      else detail=`${absE.toFixed(0)}° Est du Soleil — visible le soir`;
    } else {
      visibility='matin'; badge='badge-matin';
      detail=`${absE.toFixed(0)}° Ouest du Soleil — visible le matin`;
    }
    result[p]={...planets[p], elong, visibility, badge, detail};
  });
  return result;
}

// Version sans delta (utilisée en interne pour éviter la récursion)
function getSunTimesRaw(date, lat, lon) {
  const y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
  const n1=Math.floor(275*m/9), n2=Math.floor((m+9)/12);
  const n3=1+Math.floor((y-4*Math.floor(y/4)+2)/3);
  const N=n1-n2*n3+d-30, lh=lon/15;
  const tzOffset=-date.getTimezoneOffset()/60;
  function ct(isRise, zenith) {
    const t=isRise?N+(6-lh)/24:N+(18-lh)/24;
    const M=0.9856*t-3.289;
    let L=M+1.916*Math.sin(M*DEG)+0.020*Math.sin(2*M*DEG)+282.634;
    L=((L%360)+360)%360;
    let RA=Math.atan(0.91764*Math.tan(L*DEG))*RAD;
    RA=((RA%360)+360)%360;
    RA=(RA+(Math.floor(L/90)*90-Math.floor(RA/90)*90))/15;
    const sinDec=0.39782*Math.sin(L*DEG), cosDec=Math.cos(Math.asin(sinDec));
    const cosH=(Math.cos(zenith*DEG)-sinDec*Math.sin(lat*DEG))/(cosDec*Math.cos(lat*DEG));
    if(cosH>1||cosH<-1) return null;
    let H=isRise?360-Math.acos(cosH)*RAD:Math.acos(cosH)*RAD;
    const T=H/15+RA-0.06571*t-6.622;
    const UT=((T-lh)%24+24)%24;
    const local=(UT+tzOffset+24)%24;
    const hh=Math.floor(local), mm=Math.floor((local-hh)*60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  const rise=ct(true,90.833), set=ct(false,90.833);
  if(!rise||!set) return null;
  return {rise, set};
}

function getSunTimes(date, lat, lon) {
  const y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
  const n1=Math.floor(275*m/9), n2=Math.floor((m+9)/12);
  const n3=1+Math.floor((y-4*Math.floor(y/4)+2)/3);
  const N=n1-n2*n3+d-30, lh=lon/15;
  // FIX heure d'été : getTimezoneOffset() est dynamique
  const tzOffset=-date.getTimezoneOffset()/60;

  function ct(isRise, zenith) {
    const t=isRise?N+(6-lh)/24:N+(18-lh)/24;
    const M=0.9856*t-3.289;
    let L=M+1.916*Math.sin(M*DEG)+0.020*Math.sin(2*M*DEG)+282.634;
    L=((L%360)+360)%360;
    let RA=Math.atan(0.91764*Math.tan(L*DEG))*RAD;
    RA=((RA%360)+360)%360;
    RA=(RA+(Math.floor(L/90)*90-Math.floor(RA/90)*90))/15;
    const sinDec=0.39782*Math.sin(L*DEG), cosDec=Math.cos(Math.asin(sinDec));
    const cosH=(Math.cos(zenith*DEG)-sinDec*Math.sin(lat*DEG))/(cosDec*Math.cos(lat*DEG));
    if(cosH>1||cosH<-1) return null;
    let H=isRise?360-Math.acos(cosH)*RAD:Math.acos(cosH)*RAD;
    const T=H/15+RA-0.06571*t-6.622;
    const UT=((T-lh)%24+24)%24;
    const local=(UT+tzOffset+24)%24;
    const hh=Math.floor(local), mm=Math.floor((local-hh)*60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }

  const rise=ct(true,90.833), set=ct(false,90.833);
  const civilEnd=ct(false,96), nautEnd=ct(false,102), astroEnd=ct(false,108);
  const astroStart=ct(true,108);

  let duration='--h--', delta=null;
  if(rise&&set) {
    const [rh,rm]=rise.split(':').map(Number), [sh,sm]=set.split(':').map(Number);
    const tot=(sh*60+sm)-(rh*60+rm);
    duration=`${Math.floor(tot/60)}h${String(tot%60).padStart(2,'0')}`;
    // Calcul delta vs jour précédent
    const prev=new Date(date.getTime()-86400000);
    const ps=getSunTimesRaw(prev,lat,lon);
    if(ps) {
      const [prh,prm]=ps.rise.split(':').map(Number), [psh,psm]=ps.set.split(':').map(Number);
      const ptot=(psh*60+psm)-(prh*60+prm);
      delta=tot-ptot; // minutes de différence
    }
  }
  return {rise:rise||'--:--', set:set||'--:--', duration, delta, civilEnd, nautEnd, astroEnd, astroStart};
}

// SCORE D'OBSERVATION
// ═══════════════════════════════════════════════════════════════════

function getObsScore(date) {
  const ph=getMoonPhase(date);
  // Lune : plus elle est illuminée, plus elle gêne (0=max, 5=min gêne)
  const moonScore = Math.round(5 * (1 - ph.illumination/100));
  // Saison (latitude 42°N) : été = nuits courtes
  const doy = Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const seasonScore = doy>90&&doy<270 ? 2 : 4; // été: 2, reste: 4
  const total = Math.min(5, Math.round((moonScore*3 + seasonScore*2)/5));
  let label;
  if(total>=5) label='Excellente';
  else if(total>=4) label='Très bonne';
  else if(total>=3) label='Bonne';
  else if(total>=2) label='Médiocre';
  else label='Mauvaise';
  return {score:total, label};
}

function tidalCoeff(date) {
  const jd=julianDate(date), moon=moonPos(jd), sun=sunPos(jd);
  let e=moon.longitude-sun.longitude; if(e<0)e+=360;
  const mf=385000/moon.distance, sy=Math.cos(e*DEG);
  return Math.min(120,Math.max(20,Math.round(45+75*Math.pow(mf,3)*(0.5+0.5*Math.abs(sy)))));
}
function coeffColor(c) {
  if(c>=95) return '#e05050';
  if(c>=70) return '#e09030';
  if(c>=45) return '#c8b878';
  return '#6090c0';
}
function coeffLabel(c) {
  if(c>=95) return 'Grande vive-eau';
  if(c>=70) return 'Forte marée';
  if(c>=45) return 'Marée moyenne';
  return 'Morte-eau';
}

// ÉVÉNEMENTS ASTRO PROCHES
// ═══════════════════════════════════════════════════════════════════

function getUpcomingEvents(date, days=90) {
  const ts=date.getTime();
  return ASTRO_EVENTS.filter(e=>{
    const et=new Date(e.d).getTime();
    return et>=ts-86400000 && et<=ts+days*86400000;
  }).sort((a,b)=>new Date(a.d)-new Date(b.d)).slice(0,10);
}

function getUpcomingPhases(date) {
  const phases=[];
  let d=new Date(date.getTime()+86400000);
  const targets=[
    {name:'Nouvelle Lune 🌑', test:e=>e<11.25||e>348.75},
    {name:'Premier Quartier 🌓', test:e=>e>78&&e<108},
    {name:'Pleine Lune 🌕', test:e=>e>165&&e<195},
    {name:'Dernier Quartier 🌗', test:e=>e>258&&e<288},
  ];
  const found={};
  for(let i=0;i<35&&Object.keys(found).length<4;i++) {
    const ph=getMoonPhase(d);
    targets.forEach(t=>{
      if(!found[t.name]&&t.test(ph.elongation)) {
        found[t.name]={name:t.name, date:new Date(d)};
        phases.push(found[t.name]);
      }
    });
    d=new Date(d.getTime()+86400000);
  }
  return phases.sort((a,b)=>a.date-b.date);
}

    :`M${cx} ${cy-r} A${r} ${r} 0 0 0 ${cx} ${cy+r} A${Math.abs(tX)} ${r} 0 0 ${1-sw} ${cx} ${cy-r} Z`;

// MÉTÉO — Open-Meteo API (sans clé, gratuit)
// ═══════════════════════════════════════════════════════════════════

async function fetchWeather(lat, lon) {
  // Utilise le cache si même position et < 30 min
  const now = Date.now();
  if(wx.data && wx.lat===lat && wx.lon===lon && (now-wx.ts)<1800000) return wx.data;
  if(wx.loading) return null;
  wx.loading = true;
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'auto';
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&hourly=temperature_2m,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,wind_speed_10m&forecast_days=3&timezone=${encodeURIComponent(tz)}`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    wx.data = data; wx.lat = lat; wx.lon = lon; wx.ts = now;
    return data;
  } catch(e) {
    console.warn('Open-Meteo fetch failed:', e.message);
    return null;
  } finally {
    wx.loading = false;
  }
}

// Extraire les heures de nuit (coucher → lever du lendemain)
function extractNightHours(data, date, sunsetH, sunriseH) {
  if(!data?.hourly) return [];
  const hours = [];
  const todayStr = date.toISOString().slice(0,10);
  const tomorrowStr = new Date(date.getTime()+86400000).toISOString().slice(0,10);
  data.hourly.time.forEach((t, i) => {
    const dateStr = t.slice(0,10);
    const h = parseInt(t.slice(11,13));
    if((dateStr===todayStr && h>=sunsetH) || (dateStr===tomorrowStr && h<=sunriseH)) {
      hours.push({
        time: t.slice(11,16), hour: h, dateStr,
        cloud: data.hourly.cloud_cover[i] ?? 0,
        cloudLow: data.hourly.cloud_cover_low[i] ?? 0,
        vis: data.hourly.visibility[i] ?? 25000,
        wind: data.hourly.wind_speed_10m[i] ?? 0,
        temp: data.hourly.temperature_2m[i] ?? 10,
      });
    }
  });
  return hours;
}

// Score d'observation météo par heure (0–5)
function hourObsScore(cloud, vis, wind) {
  let s = 5;
  if     (cloud > 80) s -= 3;
  else if(cloud > 50) s -= 2;
  else if(cloud > 20) s -= 1;
  if     (vis < 3000)  s -= 2;
  else if(vis < 10000) s -= 1;
  if(wind > 40) s -= 1;
  return Math.max(0, s);
}

function scoreColor(s) {
  if(s>=5) return '#50d080';
  if(s>=4) return '#a0d050';
  if(s>=3) return '#c8b878';
  if(s>=2) return '#e09030';
  return '#e05050';
}
function scoreLabel(s) {
  if(s>=5) return 'Excellente';
  if(s>=4) return 'Très bonne';
  if(s>=3) return 'Bonne';
  if(s>=2) return 'Médiocre';
  return 'Mauvaise';
}

async function renderTonightView() {
  const d = state.selectedDate;
  const sun = getSunTimes(d, state.lat, state.lon);
  const ph  = getMoonPhase(d);
  const obs = getObsScore(d); // score lunaire seul (fallback si pas de météo)
  const vis = getPlanetVisibility(d);

  // Planètes visibles ce soir
  const planets = ['venus','mercury','mars','jupiter','saturn'];
  const visible = planets.filter(p => vis[p] && vis[p].visibility==='soir').map(p => vis[p]);
  const morning = planets.filter(p => vis[p] && vis[p].visibility==='matin').map(p => vis[p]);

  // Heures de nuit astronomique
  const sunsetH  = sun.set  !== '--:--' ? parseInt(sun.set.split(':')[0])  : 20;
  const sunriseH = sun.rise !== '--:--' ? parseInt(sun.rise.split(':')[0]) : 7;
  const astroH   = sun.astroEnd && sun.astroEnd !== '--:--' ? sun.astroEnd : '--:--';

  // Objets Messier recommandés selon saison
  const doy = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
  const MESSIER = [
    { season:[0,90],   list:[{n:'M42',name:'Nébuleuse d\'Orion',type:'Nébuleuse'},{n:'M45',name:'Pléiades',type:'Amas ouvert'},{n:'M1',name:'Nébuleuse du Crabe',type:'Rémanent'}] },
    { season:[60,180],  list:[{n:'M44',name:'Ruche',type:'Amas ouvert'},{n:'M67',name:'NGC 2682',type:'Amas ouvert'},{n:'M81',name:'Galaxie de Bode',type:'Galaxie'}] },
    { season:[150,270], list:[{n:'M13',name:'Hercule',type:'Amas globulaire'},{n:'M57',name:'Nébuleuse de la Lyre',type:'Nébuleuse planétaire'},{n:'M5',name:'Amas du Serpent',type:'Amas globulaire'}] },
    { season:[240,365], list:[{n:'M31',name:'Andromède',type:'Galaxie'},{n:'M27',name:'Nébuleuse Haltère',type:'Nébuleuse planétaire'},{n:'M15',name:'NGC 7078',type:'Amas globulaire'}] },
  ];
  let messier = MESSIER[0].list;
  for(const s of MESSIER) {
    if(doy>=s.season[0] && doy<=s.season[1]) { messier=s.list; break; }
  }

  // Tenter de récupérer la météo
  const tc = document.getElementById('tab-content');
  if(!wx.data && !wx.loading) {
    tc.innerHTML = `<div class="tab-page"><div class="loading-pulse pulse">⏳ Chargement météo…</div></div>`;
    await fetchWeather(state.lat, state.lon);
  }

  const nightHours = wx.data ? extractNightHours(wx.data, d, sunsetH, sunriseH) : [];
  const hasWeather = nightHours.length > 0;

  // Score global combiné
  let globalScore, globalLabel, weatherDesc;
  if(hasWeather) {
    const avgMeteo = nightHours.reduce((a,h)=>a+hourObsScore(h.cloud,h.vis,h.wind),0)/nightHours.length;
    const moonFactor = 1 - ph.illumination/100;
    globalScore = Math.round((avgMeteo*0.6 + moonFactor*5*0.4));
    globalScore = Math.min(5, Math.max(0, globalScore));
    const bestHours = nightHours.filter(h=>hourObsScore(h.cloud,h.vis,h.wind)>=4);
    const avgCloud = Math.round(nightHours.reduce((a,h)=>a+h.cloud,0)/nightHours.length);
    weatherDesc = `Couverture nuageuse moyenne : ${avgCloud}%`;
    globalLabel = scoreLabel(globalScore);
  } else {
    globalScore = obs.score;
    globalLabel = obs.label + (wx.loading?' (météo en cours…)':' (sans météo)');
    weatherDesc = 'Données météo indisponibles';
  }

  const scoreCol = scoreColor(globalScore);

  // HTML barre horaire météo
  let barHTML = '';
  if(hasWeather && nightHours.length) {
    const slots = nightHours.slice(0, 12); // max 12 créneaux
    const bars = slots.map(h => {
      const s = hourObsScore(h.cloud, h.vis, h.wind);
      const col = scoreColor(s);
      const cloudH = Math.max(4, h.cloud * 0.4);
      return `<div class="weather-slot" title="${h.time} — Nuages:${h.cloud}% Vent:${h.wind}km/h">
        <div class="weather-slot-inner" style="background:rgba(255,255,255,0.03);border-radius:5px;">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${cloudH}px;background:rgba(150,150,180,0.3);border-radius:3px;"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:${Math.max(3,s/5*40)}px;background:${col};opacity:0.7;border-radius:3px;"></div>
        </div>
        <div class="weather-time">${h.time.slice(0,5)}</div>
      </div>`;
    }).join('');
    const bestH = nightHours.filter(h=>hourObsScore(h.cloud,h.vis,h.wind)>=4);
    const bestStr = bestH.length
      ? `${bestH[0].time}–${bestH[bestH.length-1].time}`
      : 'Aucune';
    barHTML = `<div class="section" style="padding:12px 12px 8px;">
      <div class="section-title" style="padding:0 0 8px;">Qualité horaire — cette nuit</div>
      <div class="weather-bar">${bars}</div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span class="sans" style="font-size:10px;color:#5a5a7a;">■ barres = qualité obs.</span>
        <span class="sans" style="font-size:10px;color:#5a5a7a;">nuages = fond gris</span>
      </div>
      ${bestH.length>0?`<div class="best-window">
        <span class="sans" style="font-size:12px;color:#80c890;">✓ Meilleure fenêtre : ${bestStr}</span>
      </div>`:'<div style="background:rgba(200,80,80,0.08);border:1px solid rgba(200,80,80,0.2);border-radius:8px;padding:8px 12px;margin-top:8px;"><span class="sans" style="font-size:12px;color:#c07070;">✗ Pas de fenêtre favorable cette nuit</span></div>'}
    </div>`;
  }

  // Composants météo instantanés si dispo
  let meteoCards = '';
  if(hasWeather) {
    const now = new Date();
    const nowH = now.getHours();
    const cur = nightHours.find(h=>parseInt(h.time)===nowH) || nightHours[0];
    if(cur) meteoCards = `<div class="stat-grid" style="margin-bottom:12px;">
      <div class="stat-card"><div class="lbl">Nuages</div><div class="val">${cur.cloud}%</div></div>
      <div class="stat-card"><div class="lbl">Visibilité</div><div class="val">${cur.vis>=10000?'≥10':(cur.vis/1000).toFixed(0)}</div><div class="sub">km</div></div>
      <div class="stat-card"><div class="lbl">Vent</div><div class="val">${Math.round(cur.wind)}</div><div class="sub">km/h</div></div>
      <div class="stat-card"><div class="lbl">Température</div><div class="val">${cur.temp.toFixed(1)}°</div></div>
    </div>`;
  }

  return `<div class="tab-page">
    <!-- HERO SCORE -->
    <div class="tonight-hero">
      <div class="tonight-score-big" style="color:${scoreCol};">${'★'.repeat(globalScore)}${'☆'.repeat(5-globalScore)}</div>
      <div class="sans" style="font-size:16px;color:${scoreCol};margin-top:6px;">${globalLabel}</div>
      <div class="sans" style="font-size:12px;color:#7a7a9a;margin-top:4px;">${weatherDesc}</div>
    </div>

    <!-- HORAIRES CLÉS -->
    <div class="section" style="margin-bottom:12px;">
      <div class="row">
        <span class="row-label">Coucher du Soleil</span>
        <span class="sans">${sun.set}</span>
      </div>
      <div class="row">
        <span class="row-label">Nuit astronomique</span>
        <span class="sans" style="color:#c8b878;">${astroH} → ${sun.astroStart||'--:--'}</span>
      </div>
      <div class="row">
        <span class="row-label">Lune</span>
        <span>${ph.phaseEmoji} ${ph.illumination.toFixed(0)}% — ${ph.phaseName}</span>
      </div>
    </div>

    ${meteoCards}
    ${barHTML}

    <!-- PLANÈTES VISIBLES -->
    ${visible.length?`<div class="section">
      <div class="section-title">🌆 Planètes visibles ce soir</div>
      ${visible.map(v=>`<div class="planet-row">
        <div class="planet-icon" style="color:${v.color};font-family:'Fira Sans',sans-serif;font-weight:500;">${v.icon}</div>
        <div class="planet-info"><div class="planet-name">${v.name}</div><div class="planet-detail">${v.detail}</div></div>
        <span class="planet-badge badge-soir">Soir</span>
      </div>`).join('')}
    </div>`:''}
    ${morning.length?`<div class="section">
      <div class="section-title">🌅 Planètes visibles à l'aube</div>
      ${morning.map(v=>`<div class="planet-row">
        <div class="planet-icon" style="color:${v.color};font-family:'Fira Sans',sans-serif;font-weight:500;">${v.icon}</div>
        <div class="planet-info"><div class="planet-name">${v.name}</div><div class="planet-detail">${v.detail}</div></div>
        <span class="planet-badge badge-matin">Matin</span>
      </div>`).join('')}
    </div>`:''}

    <!-- OBJETS À OBSERVER -->
    <div class="section">
      <div class="section-title">🔭 Objets Messier de saison</div>
      ${messier.map(m=>`<div class="row">
        <div><div style="font-size:14px;">${m.n} — ${m.name}</div><div class="sans" style="font-size:11px;color:#7a7a9a;">${m.type}</div></div>
      </div>`).join('')}
    </div>

    <p class="notice">Météo : Open-Meteo (open-source, sans clé API).<br>Score = météo (60%) + phase lunaire (40%).</p>
  </div>`;
}



function renderNav() {
  const tabs=[
    {i:'🌙',l:'Lune',      t:0},
    {i:'🌆',l:'Ce soir',   t:1},
    {i:'🌌',l:'Ciel',      t:2},
    {i:'☀️', l:'Soleil',   t:3},
    {i:'🌊',l:'Marées',    t:4},
    {i:'📅',l:'Calendrier',t:5},
  ];
  document.getElementById('bottom-nav').innerHTML=tabs.map(tab=>`
    <button class="nav-btn" onclick="state.tab=${tab.t};render()"
            style="opacity:${state.tab===tab.t?1:0.38};">
      <div style="font-size:16px;">${tab.i}</div>
      <div class="sans" style="font-size:9px;margin-top:2px;">${tab.l}</div>
    </button>`).join('');
}

function render() {
  const d=state.selectedDate;
  const isToday=d.toDateString()===new Date().toDateString();
  const dateStr=d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('current-date-display').textContent=isToday?'Aujourd\'hui':dateStr;
  const tc=document.getElementById('tab-content');
  switch(state.tab) {
    case 0: tc.innerHTML=renderMoonView(); break;
    case 1: renderTonightView().then(html=>{ if(html) tc.innerHTML=html; renderNav(); }); tc.innerHTML='<div class="tab-page"><div class="loading-pulse pulse">⏳ Chargement…</div></div>'; break;
    case 2: tc.innerHTML=renderPlanetsView(); break;
    case 3: tc.innerHTML=renderSunView(); break;
    case 4: tc.innerHTML=renderTidesView(); break;
    case 5: tc.innerHTML=renderCalendarView(); break;
    default: tc.innerHTML='<div class="tab-page">—</div>';
  }
  renderNav();
}

function resetToToday() {
  state.selectedDate=new Date();
  state.calOffset=0;
  render();
}
function selectDate(y,m,d) {
  state.selectedDate=new Date(y,m,d);
  state.tab=0;
  render();
}

// ═══════════════════════════════════════════════════════════════════
// GÉOLOCALISATION & INIT
// ═══════════════════════════════════════════════════════════════════

if(navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos=>{
      state.lat=pos.coords.latitude; state.lon=pos.coords.longitude;
      const la=`${Math.abs(state.lat).toFixed(2)}°${state.lat>=0?'N':'S'}`;
      const lo=`${Math.abs(state.lon).toFixed(2)}°${state.lon>=0?'E':'O'}`;
      document.getElementById('location-text').textContent=`${la} ${lo}`;
      render();
    },
    ()=>{document.getElementById('location-text').textContent='Zaragoza (défaut)';}
  );
} else {
  document.getElementById('location-text').textContent='Zaragoza (défaut)';
}
render();
</script>

<!-- Enregistrement du Service Worker (PWA) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('Luna PWA : Service Worker enregistré', reg.scope);
        // Vérifier les mises à jour en arrière-plan
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Nouvelle version disponible — toast discret
              const toast = document.createElement('div');
              toast.innerHTML = '🌙 Mise à jour disponible — <strong>rechargez</strong> pour l\'appliquer';
              Object.assign(toast.style, {
                position:'fixed', bottom:'90px', left:'50%', transform:'translateX(-50%)',
                background:'rgba(200,184,120,0.95)', color:'#08081a',
                padding:'10px 16px', borderRadius:'20px', fontSize:'12px',
                fontFamily:'Fira Sans, sans-serif', zIndex:'99', whiteSpace:'nowrap',
                boxShadow:'0 4px 20px rgba(0,0,0,0.4)', cursor:'pointer'
              });
              toast.onclick = () => window.location.reload();
              document.body.appendChild(toast);
              setTimeout(() => toast.remove(), 8000);
            }
          });
        });
      })
      .catch(err => console.warn('Service Worker non enregistré :', err));
  });
}
</script>
